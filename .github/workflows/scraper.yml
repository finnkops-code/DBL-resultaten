name: DBL Schedule Scraper

on:
  schedule:
    - cron: '0 * * * *'     # elk uur (pikt live scores en programmawijzigingen op)
    - cron: '0 22 * * 5'    # vrijdagavond 23:00 NL (na avondwedstrijden)
    - cron: '0 17 * * 6'    # zaterdagmiddag 18:00 NL
    - cron: '0 22 * * 6'    # zaterdagavond 23:00 NL
    - cron: '0 16 * * 0'    # zondagmiddag 17:00 NL
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencies installeren
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Uitslagen scrapen
        run: python scraper_uitslagen.py

      - name: Programma scrapen
        run: python scraper_programma.py

      - name: JSON committen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.json
          git diff --staged --quiet || git commit -m "Schedule bijgewerkt: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
